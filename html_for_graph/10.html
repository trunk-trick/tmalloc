<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ptmalloc Large Bin Size Ranges (Academic Paper Style)</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .canvas-container {
            background: #ffffff;
            padding: 10px;
            max-width: 100%;
            overflow-x: auto;
        }
        svg {
            display: block;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>

<div class="canvas-container">
    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
        <!-- 定义学术风阴影与渐变 -->
        <defs>
            <style>
                .axis-title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; fill: #495057; font-weight: 600; }
                .size-label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 15px; fill: #212529; font-weight: bold; }
                .meta-step { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; fill: #1c7ed6; font-weight: 600; }
                .meta-bin { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; fill: #212529; font-weight: 600; }
                .meta-count { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; fill: #868e96; font-style: italic; }
                .block-bg { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
                .block-bg-alt { fill: #f1f3f5; stroke: #dee2e6; stroke-width: 1; }
            </style>
        </defs>

        <!-- 区域 1 背景阴影 (1024 - 3136) -->
        <rect x="80" y="110" width="180" height="40" class="block-bg" />
        <!-- 区域 2 背景阴影 (3136 - 10752) -->
        <rect x="260" y="110" width="180" height="40" class="block-bg-alt" />
        <!-- 区域 3 背景阴影 (10752 - 45056) -->
        <rect x="440" y="110" width="180" height="40" class="block-bg" />
        <!-- 区域 4 背景阴影 (45056 - 163840) -->
        <rect x="620" y="110" width="180" height="40" class="block-bg-alt" />
        <!-- 区域 5 背景阴影 (163840 - 786432) -->
        <rect x="80" y="110" width="0" height="0" /> <!-- Spacer -->
        <rect x="800" y="110" width="180" height="40" class="block-bg" />
        <!-- 区域 6 背景阴影 (786432+) -->
        <rect x="980" y="110" width="140" height="40" class="block-bg-alt" />

        <!-- 主数轴 (带箭头) -->
        <g stroke-linecap="square">
            <line x1="50" y1="130" x2="1140" y2="130" stroke="#212529" stroke-width="2" />
            <!-- 轴向箭头 -->
            <polygon points="1140,125 1152,130 1140,135" fill="#212529" />
        </g>

        <!-- 刻度线 1 (line 1) -->
        <g>
            <line x1="80" y1="100" x2="80" y2="160" stroke="#212529" stroke-width="2" />
            <text x="80" y="60" class="axis-title" text-anchor="middle">Line 1</text>
            <text x="80" y="90" class="size-label" text-anchor="middle">1,024</text>
            <!-- 对应 Bin 范围标注 -->
            <g transform="translate(170, 195)">
                <text x="0" y="0" class="meta-step" text-anchor="middle">step = 64 B</text>
                <text x="0" y="22" class="meta-bin" text-anchor="middle">bin 64 ~ 96</text>
                <text x="0" y="42" class="meta-count" text-anchor="middle">(33 bins)</text>
            </g>
        </g>

        <!-- 刻度线 2 (line 2) -->
        <g>
            <line x1="260" y1="100" x2="260" y2="160" stroke="#212529" stroke-width="2" />
            <text x="260" y="60" class="axis-title" text-anchor="middle">Line 2</text>
            <text x="260" y="90" class="size-label" text-anchor="middle">3,136</text>
            <g transform="translate(350, 195)">
                <text x="0" y="0" class="meta-step" text-anchor="middle">step = 512 B</text>
                <text x="0" y="22" class="meta-bin" text-anchor="middle">bin 97 ~ 111</text>
                <text x="0" y="42" class="meta-count" text-anchor="middle">(15 bins)</text>
            </g>
        </g>

        <!-- 刻度线 3 (line 3) -->
        <g>
            <line x1="440" y1="100" x2="440" y2="160" stroke="#212529" stroke-width="2" />
            <text x="440" y="60" class="axis-title" text-anchor="middle">Line 3</text>
            <text x="440" y="90" class="size-label" text-anchor="middle">10,752</text>
            <g transform="translate(530, 195)">
                <text x="0" y="0" class="meta-step" text-anchor="middle">step = 4,096 B</text>
                <text x="0" y="22" class="meta-bin" text-anchor="middle">bin 112 ~ 120</text>
                <text x="0" y="42" class="meta-count" text-anchor="middle">(9 bins)</text>
            </g>
        </g>

        <!-- 刻度线 4 (line 4) -->
        <g>
            <line x1="620" y1="100" x2="620" y2="160" stroke="#212529" stroke-width="2" />
            <text x="620" y="60" class="axis-title" text-anchor="middle">Line 4</text>
            <text x="620" y="90" class="size-label" text-anchor="middle">45,056</text>
            <g transform="translate(710, 195)">
                <text x="0" y="0" class="meta-step" text-anchor="middle">step = 32 KiB</text>
                <text x="0" y="22" class="meta-bin" text-anchor="middle">bin 120 ~ 123</text>
                <text x="0" y="42" class="meta-count" text-anchor="middle">(4 bins)</text>
            </g>
        </g>

        <!-- 刻度线 5 (line 5) -->
        <g>
            <line x1="800" y1="100" x2="800" y2="160" stroke="#212529" stroke-width="2" />
            <text x="800" y="60" class="axis-title" text-anchor="middle">Line 5</text>
            <text x="800" y="90" class="size-label" text-anchor="middle">163,840</text>
            <g transform="translate(890, 195)">
                <text x="0" y="0" class="meta-step" text-anchor="middle">step = 262 KiB</text>
                <text x="0" y="22" class="meta-bin" text-anchor="middle">bin 124 ~ 125</text>
                <text x="0" y="42" class="meta-count" text-anchor="middle">(2 bins)</text>
            </g>
        </g>

        <!-- 刻度线 6 (line 6) -->
        <g>
            <line x1="980" y1="100" x2="980" y2="160" stroke="#212529" stroke-width="2" />
            <text x="980" y="60" class="axis-title" text-anchor="middle">Line 6</text>
            <text x="980" y="90" class="size-label" text-anchor="middle">786,432</text>
            <g transform="translate(1050, 195)">
                <text x="0" y="0" class="meta-step" style="fill: #e8590c;" text-anchor="middle">Fallback</text>
                <text x="0" y="22" class="meta-bin" text-anchor="middle">bin 126</text>
                <text x="0" y="42" class="meta-count" text-anchor="middle">(Remaining)</text>
            </g>
        </g>
    </svg>
</div>

</body>
</html>
